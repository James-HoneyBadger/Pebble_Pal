<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="rg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="50%" stop-color="#8d8d8d"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.35)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1a2e"/>
  <!-- Shadow -->
  <ellipse cx="256" cy="420" rx="140" ry="25" fill="url(#shadow)"/>
  <!-- Rock body -->
  <ellipse cx="256" cy="290" rx="150" ry="130" fill="url(#rg)" stroke="#4a4a4a" stroke-width="2"/>
  <!-- Texture spots -->
  <ellipse cx="190" cy="250" rx="18" ry="12" fill="rgba(0,0,0,0.08)" transform="rotate(-15 190 250)"/>
  <ellipse cx="310" cy="230" rx="22" ry="10" fill="rgba(255,255,255,0.08)" transform="rotate(10 310 230)"/>
  <!-- Left eye -->
  <ellipse cx="215" cy="265" rx="28" ry="30" fill="white"/>
  <circle cx="215" cy="268" r="14" fill="#2d2d2d"/>
  <circle cx="221" cy="262" r="5" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="297" cy="265" rx="28" ry="30" fill="white"/>
  <circle cx="297" cy="268" r="14" fill="#2d2d2d"/>
  <circle cx="303" cy="262" r="5" fill="white"/>
  <!-- Mouth (smile) -->
  <path d="M 232 310 Q 256 340 280 310" fill="none" stroke="#4a4a4a" stroke-width="4" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="195" cy="310" rx="16" ry="10" fill="rgba(255,150,150,0.35)"/>
  <ellipse cx="317" cy="310" rx="16" ry="10" fill="rgba(255,150,150,0.35)"/>
  <!-- Sparkle -->
  <text x="360" y="190" font-size="48" opacity="0.8">✨</text>
</svg>
